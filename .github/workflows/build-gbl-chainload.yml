name: Build gbl-chainload

on:
  push:
    paths:
      - 'gbl-chainload/**'
  pull_request:
    paths:
      - 'gbl-chainload/**'
  workflow_dispatch:

jobs:
  build-gbl-chainload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gbl-chainload firmware
        working-directory: ./gbl-chainload
        run: |
          docker build -t gbl-chainload-build:latest -f docker/Dockerfile .
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e GBL_AUTO=0 \
            -e GBL_DEBUG=0 \
            -e GBL_VERBOSE=1 \
            -e GBL_BUILD_NAME=gbl-chainload-verbose \
            -e GBL_CHAINLOAD_VERSION=$(head -n1 VERSION | tr -d '[:space:]') \
            gbl-chainload-build:latest \
            bash scripts/build-inside-docker.sh

      - name: Copy firmware artifact to predictable path
        working-directory: ./gbl-chainload
        run: |
          mkdir -p upload
          cp dist/gbl-chainload-verbose.efi upload/gbl-chainload-popsicle-verbose.efi || \
            cp Build/GblChainloadPkg/RELEASE_*/AARCH64/GblChainload.efi upload/gbl-chainload-popsicle-verbose.efi

      - name: Build gbl Android multicall tool
        working-directory: ./gbl-chainload
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            gbl-chainload-build:latest \
            cargo build --release -p gbl --target aarch64-linux-android

      - name: Stage mode-1 install ZIP
        working-directory: ./gbl-chainload
        run: |
          cp upload/gbl-chainload-popsicle-verbose.efi zip/base/gbl-chainload.efi
          cp target/aarch64-linux-android/release/gbl zip/bin/gbl
          chmod +x zip/bin/gbl
          GBL_HASH=$(sha256sum zip/bin/gbl | awk '{print $1}')
          BUSYBOX_HASH=$(sha256sum zip/bin/busybox-arm64 | awk '{print $1}')
          EFI_HASH=$(sha256sum zip/base/gbl-chainload.efi | awk '{print $1}')
          printf '# zip-gbl-chainload vendored-artifact manifest\n# parent-commit: %s\n# parent-dirty: 0\n%s  bin/gbl\n%s  bin/busybox-arm64\n%s  base/gbl-chainload.efi\n' "$(git rev-parse HEAD)" "$GBL_HASH" "$BUSYBOX_HASH" "$EFI_HASH" > zip/bin/MANIFEST
          bash scripts/build-recovery-zip.sh --mode mode-1-install
          cp dist/gbl-chainload-mode-1-install.zip upload/gbl-chainload-popsicle-mode1.zip

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbl-chainload-popsicle
          path: |
            gbl-chainload/upload/gbl-chainload-popsicle-verbose.efi
            gbl-chainload/upload/gbl-chainload-popsicle-mode1.zip
